service:
  name: "go-without-magic"
  version: "1.3.0"
  environment: "development"

server:
  http_port: 8080
  grpc_port: 9090
  shutdown_timeout: "30s"
  read_timeout: "10s"
  write_timeout: "10s"

database:
  # Inyectar via env var APP_DATABASE_DSN en producción
  dsn: "postgres://user:CHANGE_ME@localhost:5432/go_without_magic"
  max_open_conns: 25
  max_idle_conns: 25

auth:
  # NUNCA poner el secret real aquí. Inyectar via APP_AUTH_JWT_SECRET
  jwt_secret: "CHANGE_ME_IN_PRODUCTION"

observability:
  log_level: "info"
  tracing:
    enabled: false
    service_name: "go-without-magic"
    service_version: "1.3.0"
  metrics:
    enabled: false
    path: "/metrics"